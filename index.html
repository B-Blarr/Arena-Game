<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Neon Arena – 3D-Arena-Survival-Roguelite" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 30,26 2,26' fill='none' stroke='%2300e5ff' stroke-width='3'/%3E%3C/svg%3E" />
    <title>Neon Arena</title>
  </head>
  <body>
    <canvas id="game"></canvas>
    <!-- UI-Overlay ueber dem Canvas. Screens werden von den Screen-Klassen befuellt,
         Sichtbarkeit laeuft ausschliesslich ueber die CSS-Klasse "hidden". -->
    <div id="ui">
      <div id="hud" class="layer hidden"></div>
      <div id="fx-layer" class="layer">
        <div id="vignette"></div>
        <div id="screen-flash"></div>
        <div id="popup-layer"></div>
        <div id="prompt-layer"></div>
      </div>
      <div id="screens">
        <section id="screen-menu" class="screen hidden"></section>
        <section id="screen-upgrade" class="screen hidden"></section>
        <section id="screen-pause" class="screen hidden"></section>
        <section id="screen-gameover" class="screen hidden"></section>
        <section id="screen-shop" class="screen hidden"></section>
        <section id="screen-profiles" class="screen hidden"></section>
        <section id="screen-leaderboard" class="screen hidden"></section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
